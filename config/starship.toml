add_newline = true

format = """
$python\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status
$character
"""

right_format = """
$status\
$os\
$time\
"""

[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
read_only = "󰌾"
read_only_style = "bold red"
home_symbol="~"
truncation_symbol = ""

[git_metrics]
disabled = false
added_style = "bright-green"
deleted_style = "bright-red"

[python]
format = '${symbol}\($virtualenv\)'
